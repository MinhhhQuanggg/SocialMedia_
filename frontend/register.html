<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký | Gummy</title>
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/register.css">
<style>
  body {
    background: linear-gradient(180deg, #f9f4fb 0%, #f7f7f7 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }

  .auth-page {
    width: min(500px, 100%);
    background: rgba(255,255,255,0.97);
    padding: 36px 32px 28px;
    border-radius: 28px;
    box-shadow: 0 22px 60px rgba(0,0,0,0.08);
  }

  .auth-title {
    font-family: 'Poppins', sans-serif;
    font-size: 60px;
    font-weight: 700;
    text-align: center;
    color: #E88DB5;
    margin: 0 0 12px;
  }

  .auth-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 30px;
    font-size: 15px;
  }

  .row {
    display: flex;
    gap: 22px;
    margin-bottom: 22px;
  }

  .auth-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid #e3e3e3;
    background: #fafafa;
    margin-bottom: 22px;
    font-size: 15px;
    color: #333;
    outline: none;
    transition: all 0.2s ease;
  }

  .auth-input:focus {
    border-color: rgba(110, 198, 165, 0.9);
    box-shadow: 0 0 0 5px rgba(183,235,214,0.25);
  }

  .auth-button {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 18px;
    background: #85c79d;
    color: #0f4626;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .auth-button:hover {
    transform: translateY(-1px);
    background: #7bc48a;
  }

  .auth-link-wrap {
    text-align: center;
    margin-top: 20px;
    color: #666;
    font-size: 14px;
  }

  .auth-link {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 20px;
    border-radius: 18px;
    border: 1px solid #c1e8d4;
    color: #2d7f56;
    font-weight: 700;
    background: #f4fbf7;
  }

  .auth-link:hover {
    background: #e8f7ee;
  }
</style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-title">GUMMY</div>
    <div class="auth-subtitle">Tạo tài khoản mới và bắt đầu chia sẻ những khoảnh khắc ngọt ngào.</div>

    <form id="registerForm">
      <div class="row">
        <input id="first_name" class="auth-input" type="text" placeholder="Tên" autocomplete="given-name">
        <input id="last_name" class="auth-input" type="text" placeholder="Họ" autocomplete="family-name">
      </div>
      <input id="reg_email" class="auth-input" type="email" placeholder="Email hoặc số điện thoại" autocomplete="email">
      <input id="reg_password" class="auth-input" type="password" placeholder="Mật khẩu" autocomplete="new-password">
      <button type="submit" class="auth-button">Create Account</button>
    </form>

    <div class="auth-link-wrap">
      <a class="auth-link" href="login.html">Đã có tài khoản? Đăng nhập</a>
    </div>
  </div>

  <script src="js/auth-shared.js"></script>
  <script src="js/pages/auth.js"></script>
</body>
</html>
