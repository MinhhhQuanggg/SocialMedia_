<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin Nhắn • Gummy</title>
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* ── Base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans', sans-serif;
            background: #f0f2f5;
        }

        /* ── Override layout for chat ── */
        .layout-premium {
            padding: 0 !important;
            gap: 0 !important;
            align-items: stretch !important;
            height: calc(100vh - 60px) !important;
            overflow: hidden !important;
        }

        /* ── Outer wrapper ── */
        .chat-outer {
            display: flex;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 16px;
            gap: 14px;
        }

        /* ══════════════════════════════════
   LEFT PANEL
══════════════════════════════════ */
        .chat-panel-left {
            width: 310px;
            flex-shrink: 0;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 18px 16px 12px;
            flex-shrink: 0;
        }

        .panel-header h2 {
            margin: 0 0 14px;
            font-size: 20px;
            font-weight: 700;
            color: #111;
        }

        /* Tabs */
        .chat-tabs {
            display: flex;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .chat-tab-btn {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            font-size: 13.5px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .chat-tab-btn.active {
            background: #f5f5f5;
            color: #333;
        }

        /* Search */
        .chat-search {
            position: relative;
        }

        .chat-search input {
            width: 100%;
            padding: 9px 14px 9px 36px;
            border: 1.5px solid #e8e8e8;
            border-radius: 22px;
            font-size: 13px;
            font-family: inherit;
            background: #fafafa;
            color: #333;
            outline: none;
            transition: 0.2s;
        }

        .chat-search input:focus {
            border-color: #B7EBD6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(183, 235, 214, 0.2);
        }

        .chat-search .si {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
            font-size: 12px;
        }

        /* List */
        .panel-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 8px;
        }

        .panel-list::-webkit-scrollbar {
            width: 4px;
        }

        .panel-list::-webkit-scrollbar-thumb {
            background: #eee;
            border-radius: 4px;
        }

        /* Conversation item */
        .conv-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 9px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .conv-item:hover {
            background: #f5f5f5;
        }

        .conv-item.active {
            background: #edfaf4;
        }

        .conv-item.has-unread .conv-name {
            font-weight: 700;
        }

        .conv-item.has-unread .conv-preview {
            color: #333;
            font-weight: 500;
        }

        .conv-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .conv-info {
            flex: 1;
            min-width: 0;
        }

        .conv-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-preview {
            font-size: 12.5px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-meta {
            flex-shrink: 0;
            text-align: right;
        }

        .conv-time {
            font-size: 11px;
            color: #ccc;
            margin-bottom: 4px;
        }

        .conv-badge {
            background: #E88DB5;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        /* empty / loading */
        .list-empty {
            text-align: center;
            padding: 40px 20px;
            color: #ccc;
        }

        .list-empty i {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        .list-empty p {
            font-size: 13px;
            margin: 0;
        }

        .btn-new-group {
            background: #B7EBD6;
            color: #2d6b57;
            border: none;
            border-radius: 8px;
            padding: 5px 11px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-new-group:hover {
            background: #a2dfc8;
        }

        /* ══════════════════════════════════
   RIGHT PANEL
══════════════════════════════════ */
        .chat-panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }

        /* Welcome */
        .chat-welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #ccc;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e8e8e8;
        }

        .chat-welcome i {
            font-size: 52px;
            color: #B7EBD6;
        }

        .chat-welcome h3 {
            margin: 0;
            font-size: 17px;
            color: #aaa;
            font-weight: 500;
        }

        .chat-welcome p {
            margin: 0;
            font-size: 13px;
            color: #ccc;
        }

        /* Chat frame (header + messages + input) */
        .chat-frame {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid #e8e8e8;
            background: #fff;
        }

        .chat-frame.show {
            display: flex;
        }

        /* Header */
        .chat-hdr {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: linear-gradient(135deg, #c2f0e0, #d8f8ed);
            flex-shrink: 0;
        }

        .chat-hdr img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }

        .chat-hdr-name {
            font-size: 15px;
            font-weight: 700;
            color: #111;
        }

        .chat-hdr-status {
            font-size: 12px;
            color: #5aad8e;
            margin-top: 1px;
        }

        /* Messages area */
        .chat-msgs {
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #fff;
        }

        .chat-msgs::-webkit-scrollbar {
            width: 4px;
        }

        .chat-msgs::-webkit-scrollbar-thumb {
            background: #eee;
            border-radius: 4px;
        }

        /* Message row */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .msg-row.own {
            flex-direction: row-reverse;
        }

        .msg-av {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .msg-row.own .msg-av {
            display: none;
        }

        .msg-wrap {
            display: flex;
            flex-direction: column;
            max-width: 58%;
            gap: 2px;
        }

        .msg-row.own .msg-wrap {
            align-items: flex-end;
        }

        .msg-sender {
            font-size: 11px;
            color: #aaa;
            padding-left: 2px;
            margin-bottom: 1px;
        }

        .bubble {
            display: inline-block;
            padding: 9px 14px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            max-width: 100%;
        }

        .bubble.theirs {
            background: #f2f2f2;
            color: #222;
            border-radius: 4px 20px 20px 20px;
        }

        .bubble.mine {
            background: #f4a8cc;
            color: #fff;
            border-radius: 20px 20px 4px 20px;
        }

        .msg-meta {
            font-size: 10px;
            color: #ccc;
            padding: 0 3px;
        }

        .msg-row.own .msg-meta {
            text-align: right;
        }

        .msg-seen-dot {
            width: 8px;
            height: 8px;
            background: #5aad8e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 4px;
            vertical-align: middle;
        }

        /* Media */
        .msg-img {
            max-width: 240px;
            max-height: 260px;
            border-radius: 12px;
            display: block;
            cursor: pointer;
            object-fit: cover;
        }

        .msg-video {
            max-width: 240px;
            max-height: 180px;
            border-radius: 12px;
            display: block;
        }

        .msg-file-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 12px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }

        .bubble.mine .msg-file-link {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .bubble.theirs .msg-file-link {
            color: #333;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        /* ── Input area ── */
        .chat-input-area {
            padding: 10px 14px;
            border-top: 1px solid #f0f0f0;
            flex-shrink: 0;
            background: #fff;
        }

        .media-prev-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: #f7f7f7;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .media-prev-bar.show {
            display: flex;
        }

        .mprev-thumb {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            object-fit: cover;
        }

        .mprev-name {
            flex: 1;
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mprev-rm {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 0 4px;
        }

        .mprev-rm:hover {
            color: #e88db5;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            border: 1.5px solid #e8e8e8;
            border-radius: 26px;
            padding: 4px 4px 4px 16px;
            background: #fafafa;
            transition: 0.2s;
        }

        .input-row:focus-within {
            border-color: #B7EBD6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(183, 235, 214, 0.18);
        }

        .msg-textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 100px;
            min-height: 38px;
            padding: 8px 0;
            color: #333;
        }

        .input-icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: #bbb;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .input-icon-btn:hover {
            color: #888;
            background: #f0f0f0;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #7dd3ba, #4fb896);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(79, 184, 150, 0.35);
        }

        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(79, 184, 150, 0.45);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* ── Lightbox ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 10px;
            object-fit: contain;
        }

        /* ── Create Group Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 20px;
            padding: 26px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.16);
            animation: mIn 0.22s ease;
        }

        @keyframes mIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(-12px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .modal-box h3 {
            margin: 0 0 18px;
            font-size: 17px;
            font-weight: 700;
            color: #222;
        }

        .modal-box label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
        }

        .modal-box input[type=text] {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            margin-bottom: 14px;
        }

        .modal-box input[type=text]:focus {
            border-color: #B7EBD6;
            box-shadow: 0 0 0 3px rgba(183, 235, 214, 0.2);
        }

        .modal-friend-list {
            max-height: 190px;
            overflow-y: auto;
            border: 1.5px solid #eee;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 16px;
        }

        .mf-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 9px;
            border-radius: 9px;
            cursor: pointer;
            transition: 0.15s;
        }

        .mf-item:hover {
            background: #f5f5f5;
        }

        .mf-item input {
            cursor: pointer;
            accent-color: #E88DB5;
        }

        .mf-item img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
        }

        .mf-item span {
            font-size: 13.5px;
            color: #333;
            font-weight: 500;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-cancel {
            padding: 9px 18px;
            border: 1.5px solid #eee;
            border-radius: 9px;
            background: #fff;
            color: #666;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-cancel:hover {
            background: #f5f5f5;
        }

        .btn-submit {
            padding: 9px 22px;
            border: none;
            border-radius: 9px;
            background: linear-gradient(135deg, #B7EBD6, #6CC9AE);
            color: #2d6b57;
            font-size: 13.5px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        /* dots loader */
        .dots span {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #ccc;
            border-radius: 50%;
            margin: 0 2px;
            animation: db 1.2s infinite;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes db {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }
    </style>
</head>

<body>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lbImg" src="" alt="">
    </div>

    <!-- Create Group Modal -->
    <div class="modal-overlay" id="groupModal">
        <div class="modal-box">
            <h3>✨ Tạo Nhóm Mới</h3>
            <label>Tên nhóm</label>
            <input type="text" id="groupNameInput" placeholder="VD: Hội bạn thân...">
            <label>Chọn thành viên</label>
            <div class="modal-friend-list" id="modalFriendList">
                <p style="text-align:center;color:#ccc;font-size:13px;padding:10px 0">Đang tải...</p>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeGroupModal()">Hủy</button>
                <button class="btn-submit" onclick="submitCreateGroup()">Tạo Nhóm</button>
            </div>
        </div>
    </div>

    <!-- LAYOUT -->
    <div class="layout-premium">
        <div class="chat-outer">

            <!-- ══ LEFT PANEL ══ -->
            <div class="chat-panel-left">
                <div class="panel-header">
                    <h2>Tin Nhắn</h2>
                    <div class="chat-tabs">
                        <button id="tabDirect" class="chat-tab-btn active" onclick="switchTab('direct')">Tin
                            nhắn</button>
                        <button id="tabGroup" class="chat-tab-btn" onclick="switchTab('group')">Nhóm</button>
                    </div>
                    <div class="chat-search">
                        <i class="fas fa-search si"></i>
                        <input type="text" id="searchInput" placeholder="Tìm kiếm trên Gummy"
                            oninput="filterList(this.value)">
                    </div>
                </div>

                <!-- Direct list -->
                <div id="directList" class="panel-list">
                    <div class="list-empty"><i class="fas fa-spinner fa-spin"></i>
                        <p>Đang tải...</p>
                    </div>
                </div>

                <!-- Group list -->
                <div id="groupList" class="panel-list" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 2px 10px;">
                        <span style="font-size:13px;font-weight:600;color:#666;">Nhóm của bạn</span>
                        <button class="btn-new-group" onclick="openGroupModal()"><i class="fas fa-plus"></i>
                            Mới</button>
                    </div>
                    <div id="groupListInner">
                        <div class="list-empty"><i class="fas fa-spinner fa-spin"></i>
                            <p>Đang tải...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ══ RIGHT PANEL ══ -->
            <div class="chat-panel-right">

                <!-- Welcome -->
                <div class="chat-welcome" id="chatWelcome">
                    <i class="fas fa-comment-dots"></i>
                    <h3>Chào mừng đến Gummy Chat</h3>
                    <p>Chọn một cuộc trò chuyện để bắt đầu</p>
                </div>

                <!-- Chat frame -->
                <div class="chat-frame" id="chatFrame">
                    <!-- Header -->
                    <div class="chat-hdr">
                        <img id="chatHdrAvatar" src="" alt="" onerror="this.src='images/avatars/default_avatar.png'">
                        <div>
                            <div class="chat-hdr-name" id="chatHdrName"></div>
                            <div class="chat-hdr-status" id="chatHdrStatus">Đang hoạt động</div>
                        </div>
                    </div>

                    <!-- Messages -->
                    <div class="chat-msgs" id="chatMsgs"></div>

                    <!-- Input -->
                    <div class="chat-input-area">
                        <!-- Media preview -->
                        <div class="media-prev-bar" id="mediaPrevBar">
                            <img class="mprev-thumb" id="mprevThumb" src="" alt="" style="display:none">
                            <span class="mprev-name" id="mprevName"></span>
                            <button class="mprev-rm" onclick="clearMedia()">×</button>
                        </div>

                        <div class="input-row">
                            <textarea id="msgInput" class="msg-textarea" placeholder="Viết tin nhắn..." rows="1"
                                onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
                            <button class="input-icon-btn" onclick="document.getElementById('imgInput').click()"
                                title="Gửi ảnh/video">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <button class="send-btn" id="sendBtn" onclick="sendMsg()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>

                        <input type="file" id="imgInput" style="display:none" accept="image/*,video/*">
                        <input type="file" id="fileInput" style="display:none" accept="*/*">
                    </div>
                </div>

            </div>
            <!-- END RIGHT -->

        </div>
    </div>
    <!-- END LAYOUT -->

    <script>
        /* ════════════════════════════════
           STATE
        ════════════════════════════════ */
        let me = { userId: null, name: 'Tôi', avatar: 'images/avatars/default_avatar.png' };
        let currentUid = null;   // direct chat partner userId
        let currentGid = null;   // group chat id
        let chatMode = 'direct';
        let tab = 'direct';
        let ws = null;
        let msgMap = new Map();
        let pendingFile = null;   // { file, type, objUrl }
        let friendsCache = [];
        let seenTimer = null;

        /* ── Parse JWT ── */
        (function () {
            try {
                const t = window.api?.getToken?.() || localStorage.getItem('token');
                if (t) {
                    const p = JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                    me.userId = Number(p.userId || p.uid || p.sub) || null;
                }
            } catch (e) { }
            me.name = localStorage.getItem('gummy_name') || 'Tôi';
            me.avatar = localStorage.getItem('gummy_avatar') || 'images/avatars/default_avatar.png';
        })();


        /* ════════════════════════════════
           TAB
        ════════════════════════════════ */
        function switchTab(t) {
            tab = t;
            document.getElementById('tabDirect').classList.toggle('active', t === 'direct');
            document.getElementById('tabGroup').classList.toggle('active', t === 'group');
            document.getElementById('directList').style.display = t === 'direct' ? '' : 'none';
            document.getElementById('groupList').style.display = t === 'group' ? '' : 'none';
            if (t === 'group') loadGroupList();
        }

        function filterList(q) {
            const sel = tab === 'direct' ? '#directList .conv-item' : '#groupListInner .conv-item';
            document.querySelectorAll(sel).forEach(el => {
                el.style.display = (el.dataset.name || '').toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
            });
        }


        /* ════════════════════════════════
           WEBSOCKET
        ════════════════════════════════ */
        function connectWS() {
            const token = window.api?.getToken?.() || localStorage.getItem('token');
            if (!token) return;
            const base = window.api?.baseUrl || window.BACKEND_URL || 'http://localhost:8080';
            try {
                const u = new URL(base);
                ws = new WebSocket(`${u.protocol === 'https:' ? 'wss' : 'ws'}://${u.host}/ws/chat?token=${encodeURIComponent(token)}`);
            } catch {
                ws = new WebSocket(`ws://localhost:8080/ws/chat?token=${encodeURIComponent(token)}`);
            }
            ws.onopen = () => console.log('✅ WS');
            ws.onerror = () => { };
            ws.onclose = () => setTimeout(connectWS, 3000);
            ws.onmessage = e => {
                try { handleWS(JSON.parse(e.data)); } catch (err) { }
            };
        }

        function handleWS(data) {
            if (data.type === 'NEW_MESSAGE') {
                const msg = data.data;
                const oid = msg.sender.userId === me.userId ? msg.receiver.userId : msg.sender.userId;
                updatePreview(oid, msg);
                if (chatMode === 'direct' && currentUid === oid) {
                    renderMsg(msg);
                    if (msg.receiver?.userId === me.userId) ChatAPI?.markRead?.(msg.sender.userId);
                } else if (msg.receiver?.userId === me.userId) {
                    markUnread(oid);
                }
            }
            if (data.type === 'GROUP_MESSAGE') {
                const msg = data.data; const gid = data.groupId;
                if (chatMode === 'group' && currentGid === gid) renderMsg(msg);
            }
        }

        function wsSend(payload) {
            if (ws?.readyState === WebSocket.OPEN) { ws.send(JSON.stringify(payload)); return true; }
            return false;
        }


        /* ════════════════════════════════
           DIRECT LIST
        ════════════════════════════════ */
        async function loadChatList() {
            const box = document.getElementById('directList');
            try {
                const list = await window.api?.friends?.getFriendsList?.() || [];
                friendsCache = Array.isArray(list) ? list : [];
                if (!friendsCache.length) {
                    box.innerHTML = `<div class="list-empty"><i class="fas fa-user-friends"></i><p>Chưa có bạn bè nào</p></div>`;
                    return;
                }
                box.innerHTML = '';
                for (const f of friendsCache) {
                    const uid = f.userId || f.friendId;
                    const name = f.displayName || f.username || f.userName || f.name || `User ${uid}`;
                    const av = resolveAv(f.avatarUrl);
                    const prev = await getPreview(uid);
                    appendConvItem(box, { uid, name, av, prev });
                }
            } catch (e) {
                box.innerHTML = `<div class="list-empty"><i class="fas fa-exclamation-circle"></i><p>Lỗi tải danh sách</p></div>`;
            }
        }

        async function getPreview(uid) {
            try {
                const msgs = await ChatAPI.getConversation(uid);
                if (!Array.isArray(msgs) || !msgs.length) return { text: 'Bắt đầu trò chuyện', time: '', unread: 0 };
                const last = msgs[msgs.length - 1];
                const isMe = last.sender?.userId === me.userId;
                const text = isMe
                    ? `Bạn: ${last.content || (last.imageUrl ? '[Ảnh]' : '[Video]')}`
                    : (last.content || (last.imageUrl ? '[Ảnh]' : '[Video]'));
                const unread = msgs.filter(m => !m.status && m.receiver?.userId === me.userId).length;
                return { text: (text || '').substring(0, 38), time: fmtTime(last.sentAt), unread };
            } catch { return { text: '', time: '', unread: 0 }; }
        }

        function appendConvItem(box, { uid, name, av, prev }) {
            const d = document.createElement('div');
            d.className = `conv-item${prev.unread > 0 ? ' has-unread' : ''}`;
            d.dataset.userId = uid;
            d.dataset.name = name;
            d.onclick = () => openDirect(uid, name, av);
            d.innerHTML = `
        <img class="conv-avatar" src="${av}" alt="" onerror="this.src='images/avatars/default_avatar.png'">
        <div class="conv-info">
            <div class="conv-name">${esc(name)}</div>
            <div class="conv-preview" id="prev-${uid}">${esc(prev.text)}</div>
        </div>
        <div class="conv-meta">
            <div class="conv-time" id="time-${uid}">${prev.time}</div>
            <div id="badge-${uid}" class="conv-badge" style="${prev.unread > 0 ? '' : 'display:none'}">${prev.unread || ''}</div>
        </div>`;
            box.appendChild(d);
        }

        function updatePreview(uid, msg) {
            const isMe = msg.sender?.userId === me.userId;
            const el = document.getElementById(`prev-${uid}`);
            const te = document.getElementById(`time-${uid}`);
            if (el) el.textContent = isMe ? `Bạn: ${msg.content || '[Ảnh]'}` : (msg.content || '[Ảnh]');
            if (te) te.textContent = fmtTime(msg.sentAt);
        }

        function markUnread(uid) {
            const item = document.querySelector(`.conv-item[data-user-id="${uid}"]`);
            const badge = document.getElementById(`badge-${uid}`);
            if (item) item.classList.add('has-unread');
            if (badge) { badge.textContent = (parseInt(badge.textContent) || 0) + 1; badge.style.display = ''; }
        }

        function clearUnread(uid) {
            const item = document.querySelector(`.conv-item[data-user-id="${uid}"]`);
            const badge = document.getElementById(`badge-${uid}`);
            if (item) item.classList.remove('has-unread');
            if (badge) badge.style.display = 'none';
        }


        /* ════════════════════════════════
           OPEN DIRECT
        ════════════════════════════════ */
        async function openDirect(uid, name, av) {
            currentUid = uid; currentGid = null; chatMode = 'direct';

            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            const item = document.querySelector(`.conv-item[data-user-id="${uid}"]`);
            if (item) item.classList.add('active');

            showFrame(name, av, 'Đang hoạt động');
            clearUnread(uid);
            clearMedia();
            msgMap.clear();
            setMsgs(`<div style="text-align:center;padding:30px 0;color:#ccc"><div class="dots"><span></span><span></span><span></span></div></div>`);
            if (seenTimer) clearInterval(seenTimer);

            await loadDirect(uid);
            seenTimer = setInterval(() => { if (currentUid === uid && chatMode === 'direct') refreshSeen(uid); }, 2000);
        }

        async function loadDirect(uid) {
            try {
                const msgs = await ChatAPI.getConversation(uid);
                const box = document.getElementById('chatMsgs');
                box.innerHTML = ''; msgMap.clear();
                if (!Array.isArray(msgs) || !msgs.length) {
                    box.innerHTML = `<div class="list-empty"><i class="fas fa-comment"></i><p>Chưa có tin nhắn nào. Hãy chào nhau đi!</p></div>`;
                } else {
                    msgs.forEach(m => renderMsg(m, true));
                    box.scrollTop = box.scrollHeight;
                }
                await ChatAPI.markRead(uid);
            } catch {
                setMsgs(`<div class="list-empty"><i class="fas fa-exclamation-circle"></i><p>Lỗi tải tin nhắn</p></div>`);
            }
        }

        async function refreshSeen(uid) {
            try {
                const msgs = await ChatAPI.getConversation(uid);
                if (!Array.isArray(msgs)) return;
                msgs.forEach(m => {
                    if (!m.messageId) return;
                    const c = msgMap.get(m.messageId);
                    if (c && !c.status && m.status && m.sender?.userId === me.userId) {
                        c.status = true; c.readAt = m.readAt;
                        const row = document.querySelector(`[data-mid="${m.messageId}"]`);
                        if (!row) return;
                        let dot = row.querySelector('.msg-seen-dot');
                        if (!dot) {
                            dot = document.createElement('span');
                            dot.className = 'msg-seen-dot';
                            row.querySelector('.msg-meta')?.appendChild(dot);
                        }
                    }
                });
            } catch { }
        }


        /* ════════════════════════════════
           GROUPS
        ════════════════════════════════ */
        async function loadGroupList() {
            const inner = document.getElementById('groupListInner');
            inner.innerHTML = `<div class="list-empty"><i class="fas fa-spinner fa-spin"></i><p>Đang tải...</p></div>`;
            try {
                const groups = await window.GroupAPI?.getMyGroups?.() || [];
                if (!Array.isArray(groups) || !groups.length) {
                    inner.innerHTML = `<div class="list-empty"><i class="fas fa-users"></i><p>Chưa có nhóm nào</p></div>`;
                    return;
                }
                inner.innerHTML = '';
                groups.forEach(g => {
                    const d = document.createElement('div');
                    d.className = 'conv-item'; d.dataset.name = g.groupName;
                    d.onclick = () => openGroup(g.groupId, g.groupName, g.avatarUrl);
                    d.innerHTML = `
                <img class="conv-avatar" src="${resolveAv(g.avatarUrl)}" alt="" onerror="this.src='images/avatars/default_avatar.png'">
                <div class="conv-info">
                    <div class="conv-name">${esc(g.groupName)}</div>
                    <div class="conv-preview">${g.memberCount || 0} thành viên</div>
                </div>`;
                    inner.appendChild(d);
                });
            } catch {
                inner.innerHTML = `<div class="list-empty"><i class="fas fa-exclamation-circle"></i><p>Lỗi tải nhóm</p></div>`;
            }
        }

        async function openGroup(gid, name, av) {
            currentGid = gid; currentUid = null; chatMode = 'group';
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            showFrame(name, resolveAv(av), 'Nhóm');
            clearMedia(); msgMap.clear(); if (seenTimer) clearInterval(seenTimer);
            setMsgs(`<div style="text-align:center;padding:30px 0;color:#ccc"><div class="dots"><span></span><span></span><span></span></div></div>`);
            try {
                const msgs = await window.GroupAPI?.getGroupMessages?.(gid) || [];
                const box = document.getElementById('chatMsgs');
                box.innerHTML = '';
                if (!Array.isArray(msgs) || !msgs.length) {
                    box.innerHTML = `<div class="list-empty"><i class="fas fa-comment"></i><p>Chưa có tin nhắn nào</p></div>`;
                } else { msgs.forEach(m => renderMsg(m, true)); box.scrollTop = box.scrollHeight; }
            } catch {
                setMsgs(`<div class="list-empty"><i class="fas fa-exclamation-circle"></i><p>Lỗi tải tin nhắn</p></div>`);
            }
        }


        /* ════════════════════════════════
           RENDER MESSAGE
        ════════════════════════════════ */
        function renderMsg(msg, silent = false) {
            if (!msg) return;
            const id = msg.messageId || msg.id;
            if (id && msgMap.has(id)) return;
            if (id) msgMap.set(id, msg);

            const box = document.getElementById('chatMsgs');
            if (!box) return;

            // Clear loaders/empty
            box.querySelector('.list-empty')?.remove();
            box.querySelector('.dots')?.closest('div')?.remove();

            const isOwn = msg.sender?.userId === me.userId;
            const av = resolveAv(isOwn ? me.avatar : msg.sender?.avatarUrl);
            const time = fmtTime(msg.sentAt);
            const seen = isOwn && msg.status && msg.readAt;

            // Content
            let content = '';
            if (msg.imageUrl) {
                const url = resolveMed(msg.imageUrl);
                if (msg.content?.startsWith('[FILE]')) {
                    const fname = msg.content.replace('[FILE] ', '');
                    content = `<a class="msg-file-link" href="${url}" download="${fname}" target="_blank"><i class="fas fa-file-download"></i> ${esc(fname)}</a>`;
                } else {
                    content = `<img class="msg-img" src="${url}" alt="ảnh" onclick="openLb('${url}')" onerror="this.style.display='none'">`;
                }
            } else if (msg.videoUrl) {
                content = `<video class="msg-video" controls><source src="${resolveMed(msg.videoUrl)}" type="video/mp4"></video>`;
            } else if (msg.content) {
                content = esc(msg.content);
            } else {
                content = `<span style="opacity:.5;font-style:italic">[Media]</span>`;
            }

            const senderLabel = !isOwn && chatMode === 'group'
                ? `<div class="msg-sender">${esc(msg.sender?.userName || msg.sender?.username || '')}</div>` : '';

            const row = document.createElement('div');
            row.className = `msg-row ${isOwn ? 'own' : ''}`;
            row.dataset.mid = id || '';
            row.innerHTML = `
        <img class="msg-av" src="${av}" alt="" onerror="this.src='images/avatars/default_avatar.png'">
        <div class="msg-wrap">
            ${senderLabel}
            <div class="bubble ${isOwn ? 'mine' : 'theirs'}">${content}</div>
            <div class="msg-meta">${time}${seen ? '<span class="msg-seen-dot"></span>' : ''}</div>
        </div>`;

            box.appendChild(row);
            if (!silent) box.scrollTop = box.scrollHeight;
        }


        /* ════════════════════════════════
           SEND
        ════════════════════════════════ */
        async function sendMsg() {
            if (!currentUid && !currentGid) return;
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text && !pendingFile) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            try {
                if (pendingFile) {
                    await doSendFile();
                } else {
                    await doSendText(text);
                }
                input.value = ''; input.style.height = '';
            } catch (err) {
                alert('Gửi thất bại: ' + (err.message || 'Lỗi'));
            } finally {
                btn.disabled = false; input.focus();
            }
        }

        async function doSendText(text) {
            if (chatMode === 'direct') {
                const ok = wsSend({ toUserId: currentUid, content: text });
                if (!ok) {
                    const r = await ChatAPI.sendMessage(currentUid, text);
                    if (r) renderMsg(r);
                }
            } else {
                wsSend({ type: 'GROUP_MESSAGE', groupId: currentGid, content: text });
            }
        }

        async function doSendFile() {
            if (!pendingFile) return;
            const token = window.api?.getToken?.() || localStorage.getItem('token');
            const base = window.api?.baseUrl || window.BACKEND_URL || 'http://localhost:8080';
            const fd = new FormData();
            fd.append('toUserId', currentUid);
            fd.append('file', pendingFile.file);
            fd.append('mediaType', pendingFile.type);
            const res = await fetch(`${base}/api/chat/send-media`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: fd
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const r = await res.json();
            if (r) renderMsg(r);
            clearMedia();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
        }

        function autoGrow(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }


        /* ════════════════════════════════
           FILE HANDLING
        ════════════════════════════════ */
        function setupFiles() {
            document.getElementById('imgInput').addEventListener('change', e => pickFile(e.target.files[0]));
            document.getElementById('fileInput').addEventListener('change', e => pickFile(e.target.files[0]));
        }

        function pickFile(file) {
            if (!file) return;
            if (file.size > 50 * 1024 * 1024) { alert('File quá lớn (tối đa 50MB)'); return; }
            const isImg = file.type.startsWith('image/'), isVid = file.type.startsWith('video/');
            pendingFile = { file, type: isImg ? 'image' : isVid ? 'video' : 'file', objUrl: URL.createObjectURL(file) };
            const bar = document.getElementById('mediaPrevBar');
            const thumb = document.getElementById('mprevThumb');
            const name = document.getElementById('mprevName');
            bar.classList.add('show'); name.textContent = file.name;
            if (isImg) { thumb.src = pendingFile.objUrl; thumb.style.display = ''; }
            else thumb.style.display = 'none';
            document.getElementById('msgInput').focus();
        }

        function clearMedia() {
            if (pendingFile?.objUrl) URL.revokeObjectURL(pendingFile.objUrl);
            pendingFile = null;
            document.getElementById('mediaPrevBar').classList.remove('show');
            document.getElementById('mprevThumb').src = '';
            document.getElementById('mprevName').textContent = '';
            document.getElementById('imgInput').value = '';
            document.getElementById('fileInput').value = '';
        }


        /* ════════════════════════════════
           LIGHTBOX
        ════════════════════════════════ */
        function openLb(src) { document.getElementById('lbImg').src = src; document.getElementById('lightbox').classList.add('open'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }


        /* ════════════════════════════════
           GROUP MODAL
        ════════════════════════════════ */
        async function openGroupModal() {
            document.getElementById('groupModal').classList.add('open');
            document.getElementById('groupNameInput').value = '';
            const list = document.getElementById('modalFriendList');
            list.innerHTML = '<p style="text-align:center;color:#ccc;font-size:13px;padding:10px 0">Đang tải...</p>';
            try {
                const friends = friendsCache.length ? friendsCache : (await window.api?.friends?.getFriendsList?.() || []);
                if (!friends.length) { list.innerHTML = '<p style="text-align:center;color:#ccc;font-size:13px;padding:10px 0">Chưa có bạn bè</p>'; return; }
                list.innerHTML = '';
                friends.forEach(f => {
                    const uid = f.userId || f.friendId;
                    const name = f.displayName || f.username || f.userName || f.name || `User ${uid}`;
                    const av = resolveAv(f.avatarUrl);
                    const item = document.createElement('label');
                    item.className = 'mf-item';
                    item.innerHTML = `<input type="checkbox" value="${uid}"><img src="${av}" alt="" onerror="this.src='images/avatars/default_avatar.png'"><span>${esc(name)}</span>`;
                    list.appendChild(item);
                });
            } catch { list.innerHTML = '<p style="text-align:center;color:#ccc;font-size:13px;padding:10px 0">Lỗi</p>'; }
        }

        function closeGroupModal() { document.getElementById('groupModal').classList.remove('open'); }

        async function submitCreateGroup() {
            const name = document.getElementById('groupNameInput').value.trim();
            const uids = [...document.querySelectorAll('#modalFriendList input[type=checkbox]:checked')].map(c => parseInt(c.value));
            if (!name) { alert('Vui lòng nhập tên nhóm'); return; }
            if (!uids.length) { alert('Chọn ít nhất 1 thành viên'); return; }
            try {
                await window.GroupAPI?.createGroup?.(name, uids);
                closeGroupModal(); loadGroupList();
            } catch (err) { alert('Tạo nhóm thất bại: ' + (err.message || 'Lỗi')); }
        }


        /* ════════════════════════════════
           HELPERS
        ════════════════════════════════ */
        function showFrame(name, av, status) {
            document.getElementById('chatWelcome').style.display = 'none';
            document.getElementById('chatFrame').classList.add('show');
            document.getElementById('chatHdrAvatar').src = av;
            document.getElementById('chatHdrName').textContent = name;
            document.getElementById('chatHdrStatus').textContent = status;
        }

        function setMsgs(html) {
            document.getElementById('chatMsgs').innerHTML = html;
        }

        function resolveAv(url) {
            if (!url || url === 'null' || url === 'undefined') return 'images/avatars/default_avatar.png';
            if (/^https?:\/\//i.test(url)) return url;
            const base = window.api?.baseUrl || window.BACKEND_URL || 'http://localhost:8080';
            return base.replace(/\/$/, '') + (url.startsWith('/') ? url : '/' + url);
        }

        function resolveMed(url) {
            if (!url) return '';
            if (/^https?:\/\//i.test(url) || url.startsWith('data:') || url.startsWith('blob:')) return url;
            const base = window.api?.baseUrl || window.BACKEND_URL || 'http://localhost:8080';
            return base.replace(/\/$/, '') + (url.startsWith('/') ? url : '/' + url);
        }

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function fmtTime(dt) {
            if (!dt) return '';
            try { return new Date(dt).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }); } catch { return ''; }
        }


        /* ════════════════════════════════
           INIT
        ════════════════════════════════ */
        document.addEventListener('DOMContentLoaded', () => {
            setupFiles();
            connectWS();
            loadChatList();
        });

        window.addEventListener('beforeunload', () => { if (seenTimer) clearInterval(seenTimer); });
    </script>
