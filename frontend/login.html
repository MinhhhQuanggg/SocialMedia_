<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập | Gummy</title>
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/login.css">
<style>
  body {
    background: linear-gradient(180deg, #f9f4fb 0%, #f7f7f7 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 20px;
  }

  .auth-page {
    width: min(420px, 100%);
    background: rgba(255,255,255,0.96);
    padding: 36px 30px 30px;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    position: relative;
  }

  .auth-title {
    font-family: 'Poppins', sans-serif;
    font-size: 60px;
    font-weight: 700;
    text-align: center;
    color: #E88DB5;
    margin: 0 0 18px;
  }

  .auth-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 34px;
    font-size: 15px;
  }

  .auth-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid #e3e3e3;
    background: #fafafa;
    margin-bottom: 22px;
    font-size: 15px;
    color: #333;
    outline: none;
    transition: all 0.2s ease;
  }

  .auth-input:focus {
    border-color: rgba(110, 198, 165, 0.9);
    box-shadow: 0 0 0 5px rgba(183,235,214,0.25);
  }

  .auth-button {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 18px;
    background: #85c79d;
    color: #0f4626;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .auth-button:hover {
    transform: translateY(-1px);
    background: #7bc48a;
  }

  .auth-link-wrap {
    text-align: center;
    margin-top: 22px;
    color: #666;
    font-size: 14px;
  }

  .auth-link {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 20px;
    border-radius: 18px;
    border: 1px solid #c1e8d4;
    color: #2d7f56;
    font-weight: 700;
    background: #f4fbf7;
  }

  .auth-link:hover {
    background: #e8f7ee;
  }
</style>
</head>
<body>
  <div class="auth-title">GUMMY</div>
  <div class="auth-page">
    <div class="auth-subtitle">Đăng nhập để tiếp tục kết nối với thế giới ngọt ngào.</div>

    <form id="loginForm">
      <input id="username" class="auth-input" type="text" placeholder="Email hoặc số điện thoại" autocomplete="username">
      <input id="password" class="auth-input" type="password" placeholder="Mật khẩu" autocomplete="current-password">
      <button type="submit" class="auth-button">Login</button>
    </form>

    <div class="auth-link-wrap">
      <a class="auth-link" href="register.html">Tạo tài khoản Gummy</a>
    </div>
  </div>

  <script src="js/auth-shared.js"></script>
  <script src="js/pages/auth.js"></script>
</body>
</html>
