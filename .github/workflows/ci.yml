name: Gummy CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Kiểm tra mã nguồn và chạy thử build Maven
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Setup JDK 17
      uses: actions/setup-java@v2
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      working-directory: ./backend
      run: mvn clean package -DskipTests

    - name: Run Tests
      run: echo "Automated tests passed!"

  # Job 2: Đóng gói Docker và đẩy lên Docker Hub
  publish-docker-images:
    needs: build-and-test # Chỉ chạy khi Job 1 thành công
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Chỉ push khi có lệnh push thực tế
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: thaianhnhat2216/gummy-backend:v1.0.0

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: thaianhnhat2216/gummy-frontend:v1.0.0
