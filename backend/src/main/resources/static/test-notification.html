<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Notification</title>
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            padding: 20px;
        }
        .test-buttons {
            margin: 20px 0;
        }
        .test-buttons button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            background: var(--gummy-pink);
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
        .test-buttons button:hover {
            background: var(--gummy-purple);
        }
        #log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        #log div {
            margin: 5px 0;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Test Notification System</h1>
    
    <!-- Notification UI -->
    <div class="topbar-premium">
        <div class="logo">Gummy</div>
        <input type="text" class="search-premium" placeholder="Tìm Kiếm...">
        <div class="top-icons">
            <div class="notification-wrapper" title="Thông báo">
                <i class="fas fa-bell notification-icon"></i>
                <span class="notification-badge" style="display: none;">0</span>
                <div class="notification-dropdown" style="display: none;">
                    <div class="notification-header">
                        <h3>Thông báo</h3>
                    </div>
                    <div class="notification-list">
                        <!-- Notifications will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="test-buttons">
        <button onclick="testLoadNotifications()">Load Notifications</button>
        <button onclick="testLoadUnreadCount()">Load Unread Count</button>
        <button onclick="testSimulateNewNotification()">Simulate New Notification</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <div id="log"></div>

    <script src="config.js"></script>
    <script src="js/api/api.base.js"></script>
    <script src="js/notification-manager.js"></script>
    
    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Initialize notification manager
        let notificationMgr;
        try {
            notificationMgr = initNotificationManager();
            log('✅ Notification Manager initialized successfully');
        } catch (error) {
            log('❌ Error initializing: ' + error.message);
        }

        function testLoadNotifications() {
            log('Loading notifications...');
            notificationMgr.loadNotifications().then(() => {
                log('✅ Notifications loaded: ' + notificationMgr.notifications.length + ' items');
            }).catch(err => {
                log('❌ Error loading notifications: ' + err.message);
            });
        }

        function testLoadUnreadCount() {
            log('Loading unread count...');
            notificationMgr.loadUnreadCount().then(() => {
                log('✅ Unread count: ' + notificationMgr.unreadCount);
            }).catch(err => {
                log('❌ Error loading count: ' + err.message);
            });
        }

        function testSimulateNewNotification() {
            const mockNotification = {
                notificationId: Date.now(),
                type: 'LIKE',
                message: 'Test User đã thích bài viết của bạn',
                isRead: false,
                createdAt: new Date().toISOString(),
                actor: {
                    userId: 1,
                    userName: 'testuser',
                    avatarUrl: null
                },
                post: {
                    postId: 1,
                    content: 'Test post',
                    imageUrl: null
                }
            };
            
            log('Simulating new notification...');
            notificationMgr.handleNewNotification(mockNotification);
            log('✅ Notification simulated');
        }

        // Check if user is logged in
        const token = api.getToken();
        if (!token) {
            log('⚠️ WARNING: No auth token found. Please login first.');
            log('Token: ' + token);
        } else {
            log('✅ Auth token found');
            testLoadUnreadCount();
        }
    </script>
</body>
</html>
