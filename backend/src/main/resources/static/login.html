<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập | Gummy</title>
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/login.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
  
  body {
    background: linear-gradient(-45deg, #FFDEE9 0%, #B5FFFC 100%);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    font-family: 'Poppins', sans-serif;
    margin: 0;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .auth-page {
    width: min(480px, 100%);
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 40px 36px 36px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
    transform: translateY(0);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  .auth-page:hover {
    transform: translateY(-5px);
    box-shadow: 0 35px 70px rgba(0, 150, 136, 0.15);
  }

  .auth-title {
    font-size: 48px;
    font-weight: 700;
    text-align: center;
    /* Gummy Pink Gradient */
    background: linear-gradient(90deg, #ff758c 0%, #ff7eb3 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0 0 8px;
    letter-spacing: -1px;
  }

  .auth-subtitle {
    text-align: center;
    color: #555;
    margin-bottom: 35px;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
  }

  .auth-input {
    width: 100%;
    padding: 16px 20px;
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.6);
    margin-bottom: 16px;
    font-size: 15px;
    color: #333;
    outline: none;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    font-family: 'Poppins', sans-serif;
  }

  .auth-input::placeholder {
    color: #999;
  }

  .auth-input:focus {
    background: #fff;
    border-color: #7bf1b2;
    box-shadow: 0 0 0 6px rgba(123, 241, 178, 0.2);
  }

  .auth-button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(90deg, #6df1ab, #7bf1b2);
    color: #111;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
    box-shadow: 0 10px 20px rgba(109, 241, 171, 0.3);
    font-family: 'Poppins', sans-serif;
  }

  .auth-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 25px rgba(109, 241, 171, 0.4);
    background: linear-gradient(90deg, #5fe49c, #6de2a3);
  }

  .auth-button:active {
    transform: translateY(1px);
  }

  .auth-link-wrap {
    text-align: center;
    margin-top: 25px;
  }

  .auth-link {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 20px;
    color: #444;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.8);
  }

  .auth-link:hover {
    background: rgba(255, 255, 255, 0.9);
    color: #ff758c;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  }

  /* ==================================================
     TOAST NOTIFICATIONS FIX
  ================================================== */
  .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
  }

  .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-width: 300px;
  }

  .toast.error { border-left: 6px solid #ff4d4f; }
  .toast.error .toast-icon { color: #ff4d4f; background: #fff1f0; }

  .toast.success { border-left: 6px solid #52c41a; }
  .toast.success .toast-icon { color: #52c41a; background: #f6ffed; }

  .toast-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      font-size: 14px;
  }

  .toast-message {
      font-size: 15px;
      color: #333;
      font-weight: 600;
  }

  @keyframes slideIn {
      0% { opacity: 0; transform: translateX(100px); }
      100% { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-title">GUMMY</div>
    <div class="auth-subtitle">Đăng nhập để tiếp tục kết nối với thế giới ngọt ngào.</div>

    <form id="loginForm">
      <input id="username" class="auth-input" type="text" placeholder="Email hoặc số điện thoại" autocomplete="username">
      <input id="password" class="auth-input" type="password" placeholder="Mật khẩu" autocomplete="current-password">
      <button type="submit" class="auth-button">Login</button>
    </form>

    <div class="auth-link-wrap">
      <a class="auth-link" href="register.html">Tạo tài khoản Gummy</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/api/api.base.js"></script>
  <script src="js/auth-shared.js"></script>
  <script src="js/pages/auth.js"></script>
</body>
</html>
