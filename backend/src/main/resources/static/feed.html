<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUMMY Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/ui.css">
    <style>
        :root {
            --bg-main: #f7f5f2;
            --panel: #ffffff;
            --panel-soft: #ececec;
            --mint: #a9ebd3;
            --mint-strong: #92e89d;
            --logo: #f03aa7;
            --text: #171717;
            --muted: #666666;
            --line: rgba(0, 0, 0, 0.12);
            --shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Be Vietnam Pro", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(169, 235, 211, 0.26), transparent 22%),
                radial-gradient(circle at right center, rgba(255, 187, 220, 0.18), transparent 20%),
                linear-gradient(180deg, #fcfbf9 0%, var(--bg-main) 100%);
        }

        .feed-page {
            min-height: 100vh;
        }

        .layout-feed {
            display: grid;
            grid-template-columns: minmax(420px, 1fr) 278px;
            gap: 24px;
            align-items: start;
            flex: 1;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: auto minmax(280px, 1fr) auto;
            align-items: center;
            gap: 22px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .brand {
            font-size: 2.9rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.06em;
            color: var(--logo);
            margin: 0;
        }

        .search-shell {
            position: relative;
            max-width: 910px;
            width: 100%;
            justify-self: center;
        }

        .search-shell i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.55rem;
            color: #161616;
        }

        .search-input {
            width: 100%;
            height: 46px;
            border: 1.5px solid rgba(0, 0, 0, 0.22);
            border-radius: 999px;
            background: #fff;
            padding: 0 18px 0 52px;
            outline: none;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.1);
            font-size: 1rem;
        }

        .top-icons {
            display: flex;
            align-items: center;
            gap: 18px;
            padding-right: 8px;
        }

        .icon-button {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            border: 0;
            background: transparent;
            color: #111;
            font-size: 1.6rem;
            padding: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 236px minmax(420px, 1fr) 278px;
            gap: 24px;
            align-items: start;
        }

        .leftbar {
            background: rgba(0, 0, 0, 0.09);
            min-height: calc(100vh - 67px);
            padding: 20px 14px;
            position: sticky;
            top: 67px;
            width: 400px;
        }

        .route-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .route-button {
            display: flex;
            align-items: center;
            gap: 14px;
            height: 45px;
            padding: 0 12px;
            border-radius: 9px;
            color: #101010;
            text-decoration: none;
            font-size: 0.95rem;
            background: #fff;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
        }

        .route-button.active {
            background: var(--mint);
        }

        .route-button i {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        .privacy-banner {
            margin-top: 98px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.88);
            color: #cc8cae;
            font-size: 0.95rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .main-feed {
            padding: 22px 0 48px;
        }

        .stories-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 52px;
            flex-wrap: wrap;
        }

        .story-card {
            position: relative;
            width: 88px;
            height: 136px;
            border-radius: 16px;
            overflow: hidden;
            flex: 0 0 auto;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: #fff;
        }

        .story-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .story-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 38%, rgba(0, 0, 0, 0.68) 100%);
        }

        .story-label {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 12px;
            z-index: 1;
            font-size: 0.82rem;
        }

        .composer-card {
            max-width: 550px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: 26px;
            box-shadow: var(--shadow);
            padding: 18px 20px 20px;
        }

        .composer-top {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .composer-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .composer-input {
            height: 34px;
            border: 0;
            outline: none;
            border-radius: 999px;
            background: #d9d9d9;
            padding: 0 16px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .visibility-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 30px;
            padding: 0 11px;
            border-radius: 999px;
            background: #d9d9d9;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
        }

        .composer-tools {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 68px;
            color: #151515;
            font-size: 1.05rem;
            margin-bottom: 16px;
        }

        .composer-tools i:nth-child(1) {
            color: #7ed9df;
        }

        .composer-tools i:nth-child(3) {
            color: #d94747;
        }

        .post-button {
            display: block;
            width: 88px;
            height: 22px;
            margin: 0 auto;
            border: 0;
            border-radius: 999px;
            background: #aaf29e;
            color: #5b7f4f;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .rightbar {
            padding: 26px 10px 30px 0;
        }

        .side-card {
            background: var(--panel);
            border-radius: 26px;
            box-shadow: var(--shadow);
            padding: 20px 22px;
            margin-bottom: 34px;
        }

        .side-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .title-rule {
            width: 100%;
            height: 1.5px;
            background: rgba(0, 0, 0, 0.7);
            margin-bottom: 14px;
        }

        .side-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .side-list li {
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .active-person {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .active-person img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        @media (max-width: 1180px) {
            .layout {
                grid-template-columns: 220px 1fr;
            }

            .rightbar {
                grid-column: 1 / -1;
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 20px;
                padding: 0 20px 30px;
            }

            .side-card {
                margin-bottom: 0;
            }
        }

        @media (max-width: 920px) {
            .topbar {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .brand {
                font-size: 2.4rem;
            }

            .search-shell {
                max-width: none;
            }

            .top-icons {
                justify-content: flex-end;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .leftbar {
                position: static;
                min-height: auto;
                padding: 14px;
            }

            .route-list {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .privacy-banner {
                margin-top: 18px;
            }

            .rightbar {
                grid-template-columns: 1fr;
                padding: 0 14px 30px;
            }

            .main-feed {
                padding: 18px 14px 40px;
            }
        }

        @media (max-width: 560px) {
            .route-list {
                grid-template-columns: 1fr;
            }

            .composer-top {
                grid-template-columns: auto 1fr;
            }

            .visibility-pill {
                grid-column: 1 / -1;
                justify-self: end;
            }

            .composer-tools {
                gap: 34px;
            }
        }
    </style>
</head>
<body>
    <div class="feed-page">
        <div class="layout-premium">
            <div class="layout-feed">

            <main class="main-feed">
                <section class="stories-row" aria-label="Stories">
                    <a class="story-card" href="#">
                        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=400&q=80" alt="Tạo tin story cover">
                        <span class="story-label">Tạo tin</span>
                    </a>
                    <a class="story-card" href="#">
                        <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=400&q=80" alt="Văn Bảo story cover">
                        <span class="story-label">Văn Bảo</span>
                    </a>
                    <a class="story-card" href="#">
                        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=400&q=80" alt="Anh Tú story cover">
                        <span class="story-label">Anh Tú</span>
                    </a>
                    <a class="story-card" href="#">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=400&q=80" alt="Kim Ngân story cover">
                        <span class="story-label">Kim Ngân</span>
                    </a>
                    <a class="story-card" href="#">
                        <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=400&q=80" alt="Minh Quang story cover">
                        <span class="story-label">Minh Quang</span>
                    </a>
                </section>

                <section class="composer-card" aria-label="Create post">
                    <div class="composer-top">
                        <img class="composer-avatar" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=200&q=80" alt="User avatar">
                        <input class="composer-input" type="text" placeholder="Chia sẻ suy nghĩ của bạn...">
                        <div class="visibility-pill"><i class="bi bi-globe-americas"></i><span>Công khai</span><i class="bi bi-caret-down-fill small"></i></div>
                    </div>

                    <div class="composer-tools" aria-hidden="true">
                        <i class="bi bi-image"></i>
                        <i class="bi bi-emoji-smile"></i>
                        <i class="bi bi-geo-alt-fill"></i>
                    </div>

                    <button class="post-button" type="button">Đăng</button>
                </section>
            </main>

            <aside class="rightbar" aria-label="Information panels">
                <section class="side-card">
                    <div class="side-title">Sự kiện</div>
                    <div class="title-rule"></div>
                    <ul class="side-list">
                        <li>🪄 Hội Thảo Nghệ Thuật Ngọt Ngào</li>
                        <li>🎉 Tiệc Gummy</li>
                        <li>💼 Gặp Gỡ Người Sáng Tạo</li>
                    </ul>
                </section>

                <section class="side-card">
                    <div class="side-title">Sinh nhật sắp tới</div>
                    <div class="title-rule"></div>
                    <ul class="side-list">
                        <li>🎂 Thu Nguyền – Ngày Mai</li>
                        <li>🎂 Tín Maris – Tuần Tới</li>
                    </ul>
                </section>

                <section class="side-card">
                    <div class="side-title">Đang hoạt động</div>
                    <ul class="side-list">
                        <li class="active-person"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=100&q=80" alt="Duy Trí"><span>Duy Trí</span></li>
                        <li class="active-person"><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=100&q=80" alt="Minh Quang"><span>Minh Quang</span></li>
                        <li class="active-person"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=100&q=80" alt="Kim Ngân"><span>Kim Ngân</span></li>
                    </ul>
                </section>
            </aside>
        </div>
    </div>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="js/api/api.base.js"></script>
    <script src="js/shared-layout.js"></script>
    <script src="js/pages/feed.js"></script>
</body>
</html>
