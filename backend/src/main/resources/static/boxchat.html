<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Chat UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --app-bg: #f4f2ef;
            --chat-bg: #dedede;
            --header-bg: #69dd7a;
            --bubble-light: #ffffff;
            --text-main: #111111;
            --text-soft: #5b5b5b;
            --shadow-soft: 0 24px 60px rgba(34, 34, 34, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Be Vietnam Pro", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(120, 222, 138, 0.22), transparent 28%),
                radial-gradient(circle at bottom right, rgba(0, 0, 0, 0.05), transparent 24%),
                linear-gradient(180deg, #faf8f5 0%, #f1eeea 100%);
            color: var(--text-main);
            padding: 24px;
        }

        .chat-shell {
            width: min(100%, 570px);
        }

        .chat-phone {
            background: var(--chat-bg);
            border-radius: 34px;
            box-shadow: var(--shadow-soft);
            padding: 18px 18px 22px;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 18px;
            background: var(--header-bg);
            border-radius: 28px;
            padding: 14px 22px;
            margin-bottom: 26px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 3px solid rgba(255, 255, 255, 0.35);
        }

        .contact-name {
            font-size: clamp(2rem, 4vw, 2.55rem);
            font-weight: 500;
            line-height: 1;
            margin: 0 0 8px;
        }

        .contact-status {
            margin: 0;
            font-size: 1.02rem;
            line-height: 1.2;
            color: rgba(0, 0, 0, 0.88);
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 22px;
            padding: 8px 6px 0;
        }

        .message-row {
            display: flex;
        }

        .message-row.end {
            justify-content: flex-end;
        }

        .media-card {
            width: 170px;
            height: 210px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        }

        .media-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .file-card {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            background: #ffffff;
            border-radius: 18px;
            padding: 14px 20px;
            min-width: 214px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
        }

        .file-icon {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            color: #1668d6;
            flex-shrink: 0;
        }

        .file-name {
            font-size: 1.04rem;
            font-weight: 500;
            margin: 0;
        }

        .timestamp {
            text-align: center;
            font-size: 0.92rem;
            color: #2d2d2d;
            letter-spacing: 0.01em;
        }

        .bubble {
            background: var(--bubble-light);
            border-radius: 999px;
            padding: 12px 22px;
            font-size: 0.98rem;
            line-height: 1.1;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
            max-width: 100%;
            width: auto;
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        .seen-note {
            margin-top: 8px;
            margin-left: 22px;
            font-size: 0.92rem;
            color: #282828;
        }

        .composer {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 14px;
            margin-top: 10px;
        }

        .composer-input {
            border: 0;
            outline: 0;
            width: 100%;
            height: 46px;
            border-radius: 999px;
            padding: 0 22px;
            background: #ffffff;
            color: #303030;
            font-size: 1rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
        }

        .composer-input::placeholder {
            color: #262626;
            opacity: 1;
        }

        .send-button {
            width: 54px;
            height: 54px;
            border: 0;
            background: transparent;
            padding: 0;
            color: #111111;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .send-button svg {
            width: 48px;
            height: 48px;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .chat-phone {
                border-radius: 28px;
                padding: 14px 14px 18px;
            }

            .chat-header {
                gap: 14px;
                padding: 12px 16px;
            }

            .avatar {
                width: 58px;
                height: 58px;
            }

            .contact-name {
                font-size: 1.8rem;
            }

            .media-card {
                width: 156px;
                height: 194px;
            }

            .file-card {
                min-width: 190px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <main class="chat-shell">
        <section class="chat-phone" aria-label="Chat conversation preview">
            <header class="chat-header">
                <img
                    class="avatar"
                    src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=200&q=80"
                    alt="Avatar of Duy Tri"
                >
                <div>
                    <h1 class="contact-name">Duy Trí</h1>
                    <p class="contact-status">Đang hoạt động</p>
                </div>
            </header>

            <div class="messages">
                <div class="message-row">
                    <div class="media-card">
                        <img
                            src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=600&q=80"
                            alt="Shared sunset landscape"
                        >
                    </div>
                </div>

                <div class="message-row end">
                    <div class="file-card" role="group" aria-label="Shared file Tailieu.txt">
                        <div class="file-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7zm0 1.5L17.5 7H14zM8 11h8v1.5H8zm0 3h8v1.5H8zm0 3h5v1.5H8z"/>
                            </svg>
                        </div>
                        <p class="file-name">TaiLieu.txt</p>
                    </div>
                </div>

                <div class="timestamp">22:37 8 Tháng 1, 2026</div>

                <div class="message-row end">
                    <div class="bubble">Hello</div>
                </div>

                <div class="message-row">
                    <div>
                        <div class="bubble">Xin chào!</div>
                        <div class="seen-note">Đã xem</div>
                    </div>
                </div>

                <form class="composer" action="#">
                    <input class="composer-input" type="text" placeholder="Aa" aria-label="Message input">
                    <button class="send-button" type="submit" aria-label="Send message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21.5 2.5L10.8 13.2"></path>
                            <path d="M21.5 2.5L14.7 21.5 10.8 13.2 2.5 9.3 21.5 2.5z"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
